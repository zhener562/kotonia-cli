name: Release CLI

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --locked

  # The main suite assumes a unix host (bash on PATH, /tmp, /dev/tty), so it
  # only runs on ubuntu. This job runs just the #[cfg(windows)] host tests to
  # prove the win32 bash resolver picks a real Git Bash (not the System32 WSL
  # launcher) and runs win32-side. Git for Windows is preinstalled on the
  # windows runner.
  test-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Test (win32 bash resolver)
        run: cargo test --locked win32_bash

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: kotonia-cli-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: kotonia-cli-linux-arm64
          # Intel macOS (x86_64-apple-darwin) is intentionally dropped: Apple
          # Silicon uses the arm64 asset, so only genuine Intel Macs would need
          # this — and the macos-13 runner GitHub deprecated queues for a long
          # time. Intel Mac falls back to a `kotonia-cli` on PATH.
          - os: macos-14
            target: aarch64-apple-darwin
            asset: kotonia-cli-darwin-arm64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            asset: kotonia-cli-windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist "${{ runner.temp }}/kotonia-cli"
          cp "target/${{ matrix.target }}/release/kotonia-cli" "${{ runner.temp }}/kotonia-cli/"
          tar -C "${{ runner.temp }}/kotonia-cli" -czf "dist/${{ matrix.asset }}.tar.gz" kotonia-cli
          shasum -a 256 "dist/${{ matrix.asset }}.tar.gz" > "dist/${{ matrix.asset }}.tar.gz.sha256"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'kotonia-cli'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          New-Item -ItemType Directory -Force -Path 'dist' | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/kotonia-cli.exe" "$staging/kotonia-cli.exe"
          Compress-Archive -Path "$staging/kotonia-cli.exe" -DestinationPath "dist/${{ matrix.asset }}.zip"
          $hash = (Get-FileHash "dist/${{ matrix.asset }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.asset }}.zip" | Set-Content "dist/${{ matrix.asset }}.zip.sha256" -NoNewline

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
